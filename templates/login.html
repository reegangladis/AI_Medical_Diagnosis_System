<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | MediAI Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;500;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#3b82f6;--violet:#8b5cf6;--accent:#06b6d4;
  --bg:#020810;--surface:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.07);
  --text:#eef4ff;--text-2:#8facc8;--text-3:#4d6580;
  --font-display:'Bricolage Grotesque',sans-serif;--font-body:'DM Sans',sans-serif;
  --grad-primary:linear-gradient(135deg,#3b82f6,#8b5cf6);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* Mesh background */
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orb-float 9s ease-in-out infinite;}
.orb-1{width:560px;height:560px;background:radial-gradient(circle,rgba(59,130,246,0.16),transparent);top:-200px;left:-150px;}
.orb-2{width:460px;height:460px;background:radial-gradient(circle,rgba(139,92,246,0.13),transparent);bottom:-160px;right:-100px;animation-delay:-4s;}
.orb-3{width:320px;height:320px;background:radial-gradient(circle,rgba(6,182,212,0.09),transparent);top:55%;left:55%;transform:translate(-50%,-50%);animation-delay:-6s;}
@keyframes orb-float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(25px,-18px) scale(1.04);}66%{transform:translate(-18px,22px) scale(0.96);}}

.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.035) 1px,transparent 1px);background-size:64px 64px;z-index:0;}

/* Floating icons */
.float-icons{position:fixed;inset:0;pointer-events:none;z-index:0;}
.float-icon{position:absolute;opacity:0.05;animation:icon-drift linear infinite;}
@keyframes icon-drift{0%{transform:translateY(110vh) rotate(0deg);opacity:0;}8%{opacity:0.05;}90%{opacity:0.05;}100%{transform:translateY(-220px) rotate(360deg);opacity:0;}}

/* Card */
.login-wrapper{position:relative;z-index:10;width:100%;max-width:460px;padding:20px;animation:fade-up 0.65s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes fade-up{from{opacity:0;transform:translateY(36px);}to{opacity:1;transform:translateY(0);}}

.login-card{background:rgba(5,12,26,0.82);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:2.6rem;backdrop-filter:blur(28px);box-shadow:0 48px 96px rgba(0,0,0,0.65),0 0 0 1px rgba(59,130,246,0.08);}

.brand-area{text-align:center;margin-bottom:2rem;}
.brand-logo{
  width:72px;height:72px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  border-radius:22px;display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:1rem;
  box-shadow:0 0 48px rgba(59,130,246,0.4),0 24px 36px rgba(0,0,0,0.3);
  animation:logo-pulse 3.5s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.brand-logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent 60%);}
.brand-logo svg{position:relative;z-index:1;}
@keyframes logo-pulse{0%,100%{box-shadow:0 0 36px rgba(59,130,246,0.35),0 24px 36px rgba(0,0,0,0.3);}50%{box-shadow:0 0 64px rgba(59,130,246,0.6),0 24px 36px rgba(0,0,0,0.3);}}
.brand-title{font-family:var(--font-display);font-size:1.7rem;font-weight:800;letter-spacing:-0.5px;}
.brand-sub{color:var(--text-3);font-size:0.87rem;margin-top:5px;}

.form-group{margin-bottom:1.1rem;}
.form-label{display:block;font-size:0.82rem;font-weight:600;color:var(--text-2);margin-bottom:7px;letter-spacing:0.02em;}
.input-wrapper{position:relative;}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;display:flex;align-items:center;}
.form-input{width:100%;padding:13px 16px 13px 44px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;color:var(--text);font-family:var(--font-body);font-size:0.92rem;outline:none;transition:all 0.2s;-webkit-appearance:none;}
.form-input::placeholder{color:var(--text-3);}
.form-input:focus{border-color:rgba(59,130,246,0.55);background:rgba(59,130,246,0.04);box-shadow:0 0 0 3px rgba(59,130,246,0.10);}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);cursor:pointer;padding:6px;display:flex;align-items:center;transition:color 0.2s;}
.pw-toggle:hover{color:var(--text-2);}

.form-footer{display:flex;align-items:center;justify-content:space-between;margin:0.4rem 0 1.3rem;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-2);cursor:pointer;}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer;}
.forgot-link{font-size:0.84rem;color:#60a5fa;text-decoration:none;font-weight:500;transition:color 0.2s;}
.forgot-link:hover{color:#93c5fd;}

.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:white;border:none;border-radius:14px;font-family:var(--font-display);font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.25s;box-shadow:0 8px 28px rgba(59,130,246,0.35);letter-spacing:0.2px;position:relative;overflow:hidden;}
.btn-submit::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.14),transparent 60%);opacity:0;transition:opacity 0.2s;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(59,130,246,0.45);}
.btn-submit:hover::after{opacity:1;}
.btn-submit:active{transform:translateY(0);}

.divider{display:flex;align-items:center;gap:12px;margin:1.4rem 0;color:var(--text-3);font-size:0.82rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);}

.signup-prompt{text-align:center;font-size:0.88rem;color:var(--text-2);}
.signup-prompt a{color:#60a5fa;text-decoration:none;font-weight:600;transition:color 0.2s;}
.signup-prompt a:hover{color:#93c5fd;}

.trust-row{display:flex;justify-content:center;gap:1.4rem;margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;}
.trust-item{display:flex;align-items:center;gap:6px;font-size:0.76rem;color:var(--text-3);}
.trust-item svg{width:13px;height:13px;color:var(--primary);}

.error-msg{background:rgba(244,63,94,0.09);border:1px solid rgba(244,63,94,0.2);color:#fca5a5;padding:10px 14px;border-radius:10px;font-size:0.85rem;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.error-msg svg{width:16px;height:16px;flex-shrink:0;}
</style>
</head>
<body>

<div class="bg-mesh">
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
</div>
<div class="grid-bg"></div>
<div class="float-icons">
  <svg style="position:absolute;left:8%;animation:icon-drift 13s linear 0s infinite;width:36px;height:36px;opacity:0.05;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><use href="#icon-stethoscope"/></svg>
  <svg style="position:absolute;left:28%;animation:icon-drift 16s linear -5s infinite;width:30px;height:30px;opacity:0.05;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><use href="#icon-dna"/></svg>
  <svg style="position:absolute;left:55%;animation:icon-drift 11s linear -3s infinite;width:32px;height:32px;opacity:0.05;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><use href="#icon-shield"/></svg>
  <svg style="position:absolute;left:75%;animation:icon-drift 14s linear -8s infinite;width:28px;height:28px;opacity:0.05;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><use href="#icon-activity"/></svg>
  <svg style="position:absolute;left:88%;animation:icon-drift 12s linear -2s infinite;width:34px;height:34px;opacity:0.05;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><use href="#icon-brain"/></svg>
</div>

<!-- Inline sprite for standalone page -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="icon-stethoscope" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></symbol>
  <symbol id="icon-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></symbol>
  <symbol id="icon-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
  <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></symbol>
  <symbol id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" x2="23" y1="1" y2="23"/></symbol>
  <symbol id="icon-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
  <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></symbol>
  <symbol id="icon-alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></symbol>
  <symbol id="icon-robot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="10" x="3" y="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></symbol>
  <symbol id="icon-hospital" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6v4"/><path d="M14 14h-4"/><path d="M14 18h-4"/><path d="M14 8h-4"/><path d="M18 12h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h2"/><path d="M18 22V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v18"/></symbol>
  <symbol id="icon-dna" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 15c6.667-6 13.333 0 20-6"/><path d="M9 22c1.798-1.998 2.518-3.995 2.807-5.993"/><path d="M15 2c-1.798 1.998-2.518 3.995-2.807 5.993"/><path d="m17 6-2.5-2.5"/><path d="m14 8-1-1"/><path d="m7 18 2.5 2.5"/><path d="m10 16 1 1"/><path d="m2 9 20 6"/></symbol>
  <symbol id="icon-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></symbol>
  <symbol id="icon-brain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-1.96-3 2.5 2.5 0 0 1-1.32-4.24 3 3 0 0 1 .34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.18-2z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 1.96-3 2.5 2.5 0 0 0 1.32-4.24 3 3 0 0 0-.34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.18-2z"/></symbol>
</svg>

<div class="login-wrapper">
  <div class="login-card">
    <div class="brand-area">
      <div class="brand-logo">
        <svg width="34" height="34" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><use href="#icon-stethoscope"/></svg>
      </div>
      <div class="brand-title">MediAI Suite</div>
      <div class="brand-sub">AI-Powered Clinical Intelligence Platform</div>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="error-msg">
      <svg><use href="#icon-alert"/></svg>
      {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon"><svg width="16" height="16"><use href="#icon-mail"/></svg></span>
          <input class="form-input" type="email" name="email" placeholder="doctor@healthsuite.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon"><svg width="16" height="16"><use href="#icon-lock"/></svg></span>
          <input class="form-input" type="password" id="pwField" name="password" placeholder="••••••••" required>
          <button type="button" class="pw-toggle" onclick="togglePw()" id="pwToggleBtn">
            <svg width="16" height="16" id="eyeIcon"><use href="#icon-eye"/></svg>
          </button>
        </div>
      </div>

      <div class="form-footer">
        <label class="checkbox-row">
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit">Sign In to MediAI →</button>
    </form>

    <div class="divider">or</div>

    <div class="signup-prompt">
      Don't have an account? <a href="/signup">Create free account</a>
    </div>

    <div class="trust-row">
      <span class="trust-item">
        <svg><use href="#icon-lock"/></svg> Encrypted
      </span>
      <span class="trust-item">
        <svg><use href="#icon-shield"/></svg> HIPAA Ready
      </span>
      <span class="trust-item">
        <svg><use href="#icon-robot"/></svg> AI Powered
      </span>
    </div>
  </div>
</div>

<script>
let pwVisible = false;
function togglePw() {
  const f = document.getElementById('pwField');
  const icon = document.getElementById('eyeIcon');
  pwVisible = !pwVisible;
  f.type = pwVisible ? 'text' : 'password';
  icon.innerHTML = pwVisible
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" x2="23" y1="1" y2="23" stroke="currentColor" stroke-width="1.8"/>'
    : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
}
</script>
</body>
</html>
