<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | MediAI Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;500;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#3b82f6;--violet:#8b5cf6;--accent:#06b6d4;--emerald:#10b981;
  --bg:#020810;--surface:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.07);
  --text:#eef4ff;--text-2:#8facc8;--text-3:#4d6580;
  --font-display:'Bricolage Grotesque',sans-serif;--font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px 0;}

.bg-mesh{position:fixed;inset:0;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orb-float 9s ease-in-out infinite;}
.orb-1{width:620px;height:620px;background:radial-gradient(circle,rgba(139,92,246,0.14),transparent);top:-220px;right:-120px;}
.orb-2{width:460px;height:460px;background:radial-gradient(circle,rgba(6,182,212,0.11),transparent);bottom:-120px;left:-90px;animation-delay:-4.5s;}
.orb-3{width:340px;height:340px;background:radial-gradient(circle,rgba(59,130,246,0.09),transparent);top:40%;left:30%;animation-delay:-2s;}
@keyframes orb-float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(22px,-16px) scale(1.04);}66%{transform:translate(-16px,20px) scale(0.97);}}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.035) 1px,transparent 1px);background-size:64px 64px;z-index:0;}

.signup-wrapper{position:relative;z-index:10;width:100%;max-width:500px;padding:20px;animation:fade-up 0.65s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes fade-up{from{opacity:0;transform:translateY(36px);}to{opacity:1;transform:translateY(0);}}

.signup-card{background:rgba(5,12,26,0.82);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:2.4rem;backdrop-filter:blur(28px);box-shadow:0 48px 96px rgba(0,0,0,0.65);}

.brand-area{text-align:center;margin-bottom:1.6rem;}
.brand-logo{width:68px;height:68px;background:linear-gradient(135deg,#06b6d4,#8b5cf6);border-radius:22px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:0.9rem;box-shadow:0 0 48px rgba(6,182,212,0.35);animation:glow 3.5s ease-in-out infinite;position:relative;overflow:hidden;}
.brand-logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent 60%);}
@keyframes glow{0%,100%{box-shadow:0 0 32px rgba(6,182,212,0.3);}50%{box-shadow:0 0 64px rgba(6,182,212,0.6);}}
.brand-title{font-family:var(--font-display);font-size:1.65rem;font-weight:800;letter-spacing:-0.4px;}
.brand-sub{color:var(--text-3);font-size:0.87rem;margin-top:5px;}

.feature-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.4rem;justify-content:center;}
.pill{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:99px;font-size:0.76rem;color:var(--text-3);}
.pill svg{width:12px;height:12px;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1rem;}
.form-label{display:block;font-size:0.81rem;font-weight:600;color:var(--text-2);margin-bottom:7px;}
.input-wrapper{position:relative;}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;display:flex;align-items:center;}
.form-input{width:100%;padding:13px 16px 13px 44px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;color:var(--text);font-family:var(--font-body);font-size:0.9rem;outline:none;transition:all 0.2s;}
.form-input::placeholder{color:var(--text-3);}
.form-input:focus{border-color:rgba(59,130,246,0.55);background:rgba(59,130,246,0.04);box-shadow:0 0 0 3px rgba(59,130,246,0.10);}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);cursor:pointer;padding:6px;display:flex;align-items:center;}

.strength-bar-wrap{height:5px;background:rgba(255,255,255,0.06);border-radius:99px;margin-top:8px;overflow:hidden;}
.strength-bar{height:100%;width:0%;border-radius:99px;transition:all 0.35s;}
.strength-label{font-size:0.75rem;margin-top:5px;font-weight:600;transition:color 0.3s;}

.terms-row{display:flex;align-items:flex-start;gap:10px;font-size:0.83rem;color:var(--text-2);margin:0.8rem 0 1.2rem;}
.terms-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);margin-top:2px;flex-shrink:0;}
.terms-row a{color:#60a5fa;text-decoration:none;}

.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:white;border:none;border-radius:14px;font-family:var(--font-display);font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.25s;box-shadow:0 8px 28px rgba(59,130,246,0.35);position:relative;overflow:hidden;}
.btn-submit::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.14),transparent 60%);opacity:0;transition:opacity 0.2s;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(59,130,246,0.45);}
.btn-submit:hover::after{opacity:1;}

.login-prompt{text-align:center;margin-top:1.3rem;font-size:0.87rem;color:var(--text-2);}
.login-prompt a{color:#60a5fa;text-decoration:none;font-weight:600;}

.error-msg{background:rgba(244,63,94,0.09);border:1px solid rgba(244,63,94,0.2);color:#fca5a5;padding:10px 14px;border-radius:10px;font-size:0.85rem;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}

@media(max-width:480px){.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="grid-bg"></div>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="icon-dna" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 15c6.667-6 13.333 0 20-6"/><path d="M9 22c1.798-1.998 2.518-3.995 2.807-5.993"/><path d="M15 2c-1.798 1.998-2.518 3.995-2.807 5.993"/><path d="m17 6-2.5-2.5"/><path d="m14 8-1-1"/><path d="m7 18 2.5 2.5"/><path d="m10 16 1 1"/><path d="m2 9 20 6"/></symbol>
  <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="icon-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></symbol>
  <symbol id="icon-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
  <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></symbol>
  <symbol id="icon-brain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-1.96-3 2.5 2.5 0 0 1-1.32-4.24 3 3 0 0 1 .34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.18-2z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 1.96-3 2.5 2.5 0 0 0 1.32-4.24 3 3 0 0 0-.34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.18-2z"/></symbol>
  <symbol id="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></symbol>
  <symbol id="icon-hospital" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6v4"/><path d="M14 14h-4"/><path d="M14 18h-4"/><path d="M14 8h-4"/><path d="M18 12h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h2"/><path d="M18 22V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v18"/></symbol>
  <symbol id="icon-chart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></symbol>
  <symbol id="icon-alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></symbol>
</svg>

<div class="signup-wrapper">
  <div class="signup-card">
    <div class="brand-area">
      <div class="brand-logo">
        <svg width="32" height="32" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><use href="#icon-dna"/></svg>
      </div>
      <div class="brand-title">Join MediAI Suite</div>
      <div class="brand-sub">AI-powered diagnosis, consultation & care</div>
    </div>

    <div class="feature-pills">
      <span class="pill"><svg><use href="#icon-brain"/></svg> AI Diagnosis</span>
      <span class="pill"><svg><use href="#icon-mic"/></svg> Voice Doctor</span>
      <span class="pill"><svg><use href="#icon-hospital"/></svg> Hospital Booking</span>
      <span class="pill"><svg><use href="#icon-chart"/></svg> Analytics</span>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="error-msg">
      <svg width="16" height="16"><use href="#icon-alert"/></svg>
      {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-wrapper">
          <span class="input-icon"><svg width="16" height="16"><use href="#icon-user"/></svg></span>
          <input class="form-input" type="text" name="name" placeholder="Dr. Sarah Johnson" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon"><svg width="16" height="16"><use href="#icon-mail"/></svg></span>
          <input class="form-input" type="email" name="email" placeholder="sarah@medcenter.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon"><svg width="16" height="16"><use href="#icon-lock"/></svg></span>
          <input class="form-input" type="password" id="pwField" name="password" placeholder="Create a strong password" required oninput="updateStrength(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw()">
            <svg width="16" height="16" id="eyeIcon"><use href="#icon-eye"/></svg>
          </button>
        </div>
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <label class="terms-row">
        <input type="checkbox" required>
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </label>

      <button type="submit" class="btn-submit">Create Account →</button>
    </form>

    <div class="login-prompt">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>

<script>
function updateStrength(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;
  const colors = ['','#f43f5e','#f97316','#eab308','#10b981','#06b6d4'];
  const labels = ['','Weak','Fair','Good','Strong','Excellent'];
  document.getElementById('strengthBar').style.width = (score/5*100)+'%';
  document.getElementById('strengthBar').style.background = colors[score]||'';
  document.getElementById('strengthLabel').textContent = labels[score]||'';
  document.getElementById('strengthLabel').style.color = colors[score]||'';
}
let pwVisible = false;
function togglePw() {
  const f = document.getElementById('pwField');
  pwVisible = !pwVisible;
  f.type = pwVisible ? 'text' : 'password';
}
</script>
</body>
</html>
